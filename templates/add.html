<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luxe Clinic | Registration</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', sans-serif; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .form-container { 
            border: 2px solid #000; 
            padding: 40px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
        }
        h2 { 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 30px; 
        }
        input { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 1px solid #eee; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #000; 
            color: #fff; 
            border: none; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: bold;
        }
        .back-link { 
            display: block; 
            margin-top: 20px; 
            color: #888; 
            text-decoration: none; 
            font-size: 12px; 
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Patient Registration</h2>
    <form action="/add" method="POST">
        <input type="text" name="p_name" placeholder="PATIENT FULL NAME" required>
        <input type="text" name="p_issue" placeholder="MEDICAL CONCERN" required>
        <button type="submit">Add to Queue</button>
    </form>
    <a href="/" class="back-link">← BACK TO DASHBOARD</a>
</div>

</body>
</html>
